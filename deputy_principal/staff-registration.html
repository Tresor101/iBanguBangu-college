<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Support Staff Registration</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <style>
    body {
      background: linear-gradient(135deg, #f8fafc 0%, #eff6ff 55%, #f0fdf4 100%);
      min-height: 100vh;
      color: #0f172a;
    }

    .form-card {
      border: 1px solid #e2e8f0;
      border-radius: 1rem;
      box-shadow: 0 12px 28px rgba(15, 23, 42, 0.1);
      overflow: hidden;
    }

    .form-header {
      background: linear-gradient(120deg, #0f766e, #2563eb);
      color: #fff;
      padding: 1.1rem 1.3rem;
    }

    .form-header h1 {
      margin: 0;
      font-size: 1.2rem;
      font-weight: 700;
    }

    .form-header p {
      margin: 0.35rem 0 0;
      font-size: 0.92rem;
      opacity: 0.95;
    }

    .form-control,
    .form-select {
      border-radius: 0.65rem;
    }

    .btn-primary {
      background: linear-gradient(120deg, #2563eb, #0f766e);
      border: 0;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container py-4 py-lg-5">
    <div class="row justify-content-center">
      <div class="col-12 col-lg-8 col-xl-7">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h2 class="h5 mb-0">Deputy Director Office</h2>
          <a href="deputy-director-dashboard.html" class="btn btn-outline-secondary btn-sm">Back to Dashboard</a>
        </div>

        <div class="card form-card">
          <div class="form-header">
            <h1>Support Staff Registration</h1>
            <p>This form is only for Secretary, Finance, and Disciplinary Officer.</p>
          </div>
          <div class="card-body p-3 p-md-4">
            <form id="staffRegistrationForm" class="row g-3" novalidate>
              <div class="col-12 col-md-6">
                <label for="role" class="form-label">Role</label>
                <select id="role" class="form-select" required>
                  <option value="" selected disabled>Select role</option>
                  <option value="Secretary">Secretary</option>
                  <option value="Finance">Finance</option>
                  <option value="Disciplinary Officer">Disciplinary Officer</option>
                </select>
                <div class="invalid-feedback">Please select a role.</div>
              </div>

              <div class="col-12 col-md-6">
                <label for="fullName" class="form-label">Full Name</label>
                <input id="fullName" type="text" class="form-control" minlength="3" maxlength="80" required />
                <div class="invalid-feedback">Please enter a valid full name.</div>
              </div>

              <div class="col-12 col-md-6">
                <label for="phone" class="form-label">Primary Contact Number</label>
                <input id="phone" type="tel" class="form-control" inputmode="tel" pattern="^[0-9+()\-\s]{7,20}$" required />
                <div class="invalid-feedback">Enter a valid phone number.</div>
              </div>

              <div class="col-12 col-md-6">
                <label for="password" class="form-label">Password</label>
                <input id="password" type="password" class="form-control" minlength="6" required />
                <div class="invalid-feedback">Password must be at least 6 characters.</div>
              </div>

              <div class="col-12 col-md-6">
                <label for="confirmPassword" class="form-label">Confirm Password</label>
                <input id="confirmPassword" type="password" class="form-control" minlength="6" required />
                <div class="invalid-feedback">Passwords must match.</div>
              </div>

              <div class="col-12 d-flex justify-content-center gap-2 mt-2">
                <button type="submit" class="btn btn-primary">Register Staff</button>
                <button type="reset" class="btn btn-outline-secondary">Clear</button>
              </div>
            </form>

            <div id="formMessage" class="alert mt-3 d-none mb-0" role="alert"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById("staffRegistrationForm");
    const role = document.getElementById("role");
    const password = document.getElementById("password");
    const confirmPassword = document.getElementById("confirmPassword");
    const fullName = document.getElementById("fullName");
    const phone = document.getElementById("phone");
    const formMessage = document.getElementById("formMessage");

    function resetMessage() {
      formMessage.classList.add("d-none");
      formMessage.classList.remove("alert-danger", "alert-success");
      formMessage.textContent = "";
    }

    function validatePasswordMatch() {
      if (password.value !== confirmPassword.value) {
        confirmPassword.setCustomValidity("Passwords do not match");
      } else {
        confirmPassword.setCustomValidity("");
      }
    }

    [role, password, confirmPassword, fullName, phone].forEach((input) => {
      input.addEventListener("input", () => {
        validatePasswordMatch();
        resetMessage();
      });
    });

    form.addEventListener("reset", () => {
      confirmPassword.setCustomValidity("");
      form.classList.remove("was-validated");
      resetMessage();
    });

    form.addEventListener("submit", (event) => {
      event.preventDefault();

      fullName.value = fullName.value.trim().replace(/\s+/g, " ");
      phone.value = phone.value.trim();
      validatePasswordMatch();

      if (!form.checkValidity()) {
        form.classList.add("was-validated");
        formMessage.textContent = "Please fix the highlighted fields and try again.";
        formMessage.classList.remove("d-none", "alert-success");
        formMessage.classList.add("alert-danger");
        return;
      }

      formMessage.textContent = role.value + " registered successfully.";
      formMessage.classList.remove("d-none", "alert-danger");
      formMessage.classList.add("alert-success");
      form.reset();
      form.classList.remove("was-validated");
    });
  </script>
</body>
</html>
