<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Department Registration Form</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <link rel="stylesheet" href="department.css" />
</head>
<body>
  <div class="container py-4 py-lg-5">
    <div class="row justify-content-center">
      <div class="col-12 col-lg-10 col-xl-8">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h2 class="h5 mb-0">Registrar Office</h2>
          <a href="dashboard.html" class="btn btn-outline-secondary btn-sm">Back to Secretary Dashboard</a>
        </div>

        <div class="card shadow registration-card">
          <div class="registration-header">
            <h1>Department Registration</h1>
            <p>Create school departments used for subjects and staffing structure.</p>
          </div>
          <div class="card-body p-3 p-md-4 p-lg-5">
            <form id="departmentForm" novalidate>
              <div class="d-grid gap-3">
                <section class="form-section">
                  <h2 class="section-title">Department Information</h2>
                  <div class="row g-3">
                    <div class="col-12 col-md-6">
                      <label for="departmentCode" class="form-label">Department Code (Auto-generated)</label>
                      <input id="departmentCode" name="departmentCode" type="text" class="form-control" readonly aria-readonly="true" />
                    </div>
                    <div class="col-12 col-md-6">
                      <label for="departmentName" class="form-label">Department Name</label>
                      <input id="departmentName" name="departmentName" type="text" class="form-control" required />
                    </div>
                  </div>
                </section>

                <div class="d-grid">
                  <button type="submit" class="btn btn-primary btn-lg">Save Department</button>
                </div>
              </div>

              <div id="formMessage" class="alert mt-3 d-none" role="alert" aria-live="polite"></div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="department.js"></script>
</body>
</html>
