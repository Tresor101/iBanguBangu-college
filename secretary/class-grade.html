<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Class / Grade Registration Form</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <link rel="stylesheet" href="class-grade.css" />
</head>
<body>
  <div class="container py-4 py-lg-5">
    <div class="row justify-content-center">
      <div class="col-12 col-lg-10 col-xl-9">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h2 class="h5 mb-0">Registrar Office</h2>
          <div class="d-flex gap-2">
            <a href="manage-class.html" class="btn btn-outline-primary btn-sm">Manage Classes</a>
            <a href="dashboard.html" class="btn btn-outline-secondary btn-sm">Back to Secretary Dashboard</a>
          </div>
        </div>

        <div class="card shadow registration-card">
          <div class="registration-header">
            <h1>Class / Grade Registration</h1>
            <p>Create classes and grade groups for academic organization.</p>
          </div>
          <div class="card-body p-3 p-md-4 p-lg-5">
            <form id="classForm" novalidate>
              <div class="d-grid gap-3">
                <section class="form-section">
                  <h2 class="section-title">Class Information</h2>
                  <div class="row g-3">
                    <div class="col-12 col-md-6">
                      <label for="classCode" class="form-label">Class Code (Auto-generated)</label>
                      <input id="classCode" name="classCode" type="text" class="form-control" readonly aria-readonly="true" />
                    </div>
                    <div class="col-12 col-md-6">
                      <label for="classGrade" class="form-label">Grade / Class Name</label>
                      <input id="classGrade" name="classGrade" type="text" class="form-control" placeholder="Grade 10 Commerce" required />
                    </div>
                    <div class="col-12 col-md-6">
                      <label for="section" class="form-label">Section</label>
                      <input id="section" name="section" type="text" class="form-control" placeholder="A" required />
                    </div>
                  </div>
                </section>

                <div class="d-grid">
                  <button type="submit" class="btn btn-primary btn-lg">Save Class/Grade</button>
                </div>
              </div>

              <div id="formMessage" class="alert mt-3 d-none" role="alert" aria-live="polite"></div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="class-grade.js"></script>
</body>
</html>
