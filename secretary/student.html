<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Registration Form</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <link rel="stylesheet" href="student.css" />
</head>
<body>
  <div class="container py-4 py-lg-5">
    <div class="row justify-content-center">
      <div class="col-12 col-lg-10 col-xl-9">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h2 class="h5 mb-0">Registrar Office</h2>
          <a href="dashboard.html" class="btn btn-dark">Back to Secretary Dashboard</a>
        </div>
        <div class="card shadow registration-card">
          <div class="registration-header">
            <h1>Student Registration</h1>
            <p>Provide only the essential student information and parent ID.</p>
          </div>
          <div class="card-body p-3 p-md-4 p-lg-5">

            <form id="registrationForm" novalidate>
              <div class="d-grid gap-3">
                <section class="form-section">
                  <h2 class="section-title">1) Student Information</h2>
                  <div class="row g-3">
                    <div class="col-12">
                      <label for="studentId" class="form-label">Student ID (Auto-generated)</label>
                      <input id="studentId" name="studentId" type="text" class="form-control" readonly aria-readonly="true" />
                    </div>
                    <div class="col-12">
                      <label for="fullName" class="form-label">Full Name</label>
                      <input id="fullName" name="fullName" type="text" class="form-control" required autocomplete="name" />
                    </div>
                    <div class="col-12 col-md-6">
                      <label for="gender" class="form-label">Gender</label>
                      <select id="gender" name="gender" class="form-select" required>
                        <option value="" selected disabled>Select gender</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                      </select>
                    </div>
                    <div class="col-12 col-md-6">
                      <label for="dob" class="form-label">Date of Birth</label>
                      <input id="dob" name="dob" type="date" class="form-control" required />
                    </div>
                    <div class="col-12 col-md-6">
                      <label for="grade" class="form-label">Class / Grade</label>
                      <input id="grade" name="grade" type="text" class="form-control" required />
                    </div>
                  </div>
                </section>
                <section class="form-section">
                  <h2 class="section-title">2) Parent Reference</h2>
                  <div class="row g-3">
                    <div class="col-12">
                      <label for="parentId" class="form-label">Parent ID</label>
                      <input id="parentId" name="parentId" type="text" class="form-control" required />
                    </div>
                  </div>
                </section>
                <div class="d-grid">
                  <button type="submit" class="btn btn-danger btn-lg">Submit Registration</button>
                </div>
              </div>
              <div id="formMessage" class="alert mt-3 d-none" role="alert" aria-live="polite"></div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="student.js"></script>
</body>
</html>
