<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Teacher</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <link rel="stylesheet" href="teacher.css" />
</head>
<body>
  <div class="container py-4 py-lg-5">
    <div class="row justify-content-center">
      <div class="col-12 col-lg-8 col-xl-7">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h2 class="h5 mb-0">Registrar Office</h2>
          <a href="dashboard.html" class="btn btn-outline-secondary btn-sm">Back to Secretary Dashboard</a>
        </div>

        <div class="card form-card">
          <div class="form-header">
            <h1 class="h5 mb-1">Add Teacher</h1>
            <p class="small mb-0">Register a new teacher profile.</p>
          </div>
          <div class="card-body p-3 p-md-4">
            <form id="teacherForm" class="row g-3" novalidate>
              <div class="col-12 col-md-6">
                <label for="fullName" class="form-label">Full Name</label>
                <input id="fullName" type="text" class="form-control" minlength="3" required />
                <div class="invalid-feedback">Please enter full name.</div>
              </div>
              <div class="col-12 col-md-6">
                <label for="phone" class="form-label">Phone Number</label>
                <input id="phone" type="tel" class="form-control" pattern="[0-9+\-() ]{7,}" required />
                <div class="invalid-feedback">Please enter a valid phone number.</div>
              </div>
              <div class="col-12 col-md-6">
                <label for="password" class="form-label">Password</label>
                <input id="password" type="password" class="form-control" minlength="6" required />
                <div class="invalid-feedback">Password must be at least 6 characters.</div>
              </div>
              <div class="col-12 col-md-6">
                <label for="confirmPassword" class="form-label">Confirm Password</label>
                <input id="confirmPassword" type="password" class="form-control" minlength="6" required />
                <div class="invalid-feedback">Passwords must match.</div>
              </div>
              <div class="col-12 d-flex justify-content-center gap-2 mt-2">
                <button type="submit" class="btn btn-primary">Save Teacher</button>
                <button type="reset" class="btn btn-outline-secondary">Clear</button>
              </div>
            </form>
            <div id="formMessage" class="alert mt-3 d-none mb-0" role="alert"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="teacher.js"></script>
</body>
</html>
