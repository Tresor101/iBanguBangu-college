<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Class Assignments</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <link rel="stylesheet" href="manage-class.css" />
</head>
<body>
  <div class="container py-4 py-lg-5">
    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
      <div>
        <h1 class="h4 mb-1">Manage Class Assignments</h1>
        <p class="mb-0 text-secondary small">Assign a subject, department, and teacher to each class.</p>
      </div>
      <div class="d-flex gap-2">
        <a href="dashboard.html" class="btn btn-dark">Back to Secretary Dashboard</a>
      </div>
    </div>

    <div class="card manage-card mt-3">
      <div class="card-body">
        <h2 class="h6 mb-3">Assign Subject, Department, and Teacher to Class</h2>
        <form id="assignmentForm" class="row g-3" novalidate>
          <div class="col-12 col-md-3">
            <label for="assignClassCode" class="form-label">Class Code</label>
            <select id="assignClassCode" name="assignClassCode" class="form-select" required>
              <option value="" selected disabled>Select class code</option>
            </select>
          </div>
          <div class="col-12 col-md-3">
            <label for="assignSubjectCode" class="form-label">Subject</label>
            <select id="assignSubjectCode" name="assignSubjectCode" class="form-select" required>
              <option value="" selected disabled>Select subject</option>
            </select>
          </div>
          <div class="col-12 col-md-3">
            <label for="assignDepartment" class="form-label">Department</label>
            <input id="assignDepartment" name="assignDepartment" type="text" class="form-control" readonly aria-readonly="true" />
          </div>
          <div class="col-12 col-md-3">
            <label for="assignTeacherCode" class="form-label">Teacher</label>
            <select id="assignTeacherCode" name="assignTeacherCode" class="form-select" required>
              <option value="" selected disabled>Select teacher</option>
            </select>
          </div>
          <div class="col-12 d-grid d-md-flex justify-content-md-end">
            <button type="submit" class="btn btn-primary">Save Assignment</button>
          </div>
          <div class="col-12">
            <div id="assignmentMessage" class="alert d-none mb-0" role="alert" aria-live="polite"></div>
          </div>
        </form>

        <hr class="my-4" />

        <div class="table-responsive">
          <table class="table align-middle">
            <thead>
              <tr>
                <th>Class Code</th>
                <th>Subject</th>
                <th>Department</th>
                <th>Teacher</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="assignmentTableBody"></tbody>
          </table>
        </div>
        <div id="assignmentEmptyState" class="text-secondary small d-none">No assignments yet. Save a class assignment to get started.</div>
      </div>
    </div>
  </div>

  <script src="manage-class.js"></script>
</body>
</html>
