<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subject Registration Form</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <link rel="stylesheet" href="subject.css" />
</head>
<body>
  <div class="container py-4 py-lg-5">
    <div class="row justify-content-center">
      <div class="col-12 col-lg-10 col-xl-9">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h2 class="h5 mb-0">Registrar Office</h2>
          <a href="dashboard.html" class="btn btn-outline-secondary btn-sm">Back to Secretary Dashboard</a>
        </div>

        <div class="card shadow registration-card">
          <div class="registration-header">
            <h1>Subject Registration</h1>
            <p>Create and maintain school subjects assigned to each grade.</p>
          </div>
          <div class="card-body p-3 p-md-4 p-lg-5">
            <form id="subjectForm" novalidate>
              <div class="d-grid gap-3">
                <section class="form-section">
                  <h2 class="section-title">1) Subject Information</h2>
                  <div class="row g-3">
                    <div class="col-12 col-md-6">
                      <label for="subjectCode" class="form-label">Subject Code (Auto-generated)</label>
                      <input id="subjectCode" name="subjectCode" type="text" class="form-control" readonly aria-readonly="true" />
                    </div>
                    <div class="col-12 col-md-6">
                      <label for="subjectName" class="form-label">Subject Name</label>
                      <input id="subjectName" name="subjectName" type="text" class="form-control" required />
                    </div>
                    <div class="col-12 col-md-6">
                      <label for="classCode" class="form-label">Class Code</label>
                      <select id="classCode" name="classCode" class="form-select" required>
                        <option value="" selected disabled>Select class code</option>
                      </select>
                    </div>
                    <input id="gradeLevel" name="gradeLevel" type="hidden" />
                    <div class="col-12 col-md-6">
                      <label for="departmentId" class="form-label">Department</label>
                      <select id="departmentId" name="departmentId" class="form-select" required>
                        <option value="" selected disabled>Select department</option>
                      </select>
                    </div>
                    <div class="col-12 col-md-6">
                      <label for="maximumMark" class="form-label">Maximum Mark</label>
                      <input id="maximumMark" name="maximumMark" type="number" class="form-control" min="1" step="1" value="100" required />
                    </div>
                  </div>
                </section>

                <div class="d-grid">
                  <button type="submit" class="btn btn-primary btn-lg">Save Subject</button>
                </div>
              </div>

              <div id="formMessage" class="alert mt-3 d-none" role="alert" aria-live="polite"></div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="subject.js"></script>
</body>
</html>
